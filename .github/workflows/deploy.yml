name: Deploy — Vercel (production)

on:
  push:
    branches: ["master", "main"]

# N'autorise qu'un seul déploiement à la fois
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Tests (Railway attend le succès de ce job via "Wait for CI") ─────────
  test:
    name: Tests avant déploiement
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET_KEY: "ci-test-secret-key-32chars-minimum"
          OAUTH_STATE_SECRET: "ci-oauth-state-secret"
          FERNET_KEY: "RrdcRxBr2IIxHpfU6EBYxNPAp0Hk_j0-z-9nEaFWJgo="
          WATCHER_SECRET: "ci-watcher-secret"
          MISTRAL_API_KEY: "ci-mistral-key"
          RESEND_API_KEY: "ci-resend-key"
          RESEND_FROM_EMAIL: "no-reply@cipherflow.company"
          FRONTEND_URL: "http://localhost:5173"
          ENABLE_RETENTION_WORKER: "false"
          ENVIRONMENT: "test"
        run: |
          python -m pytest tests/ -v --tb=short

  # ── 2. Déploiement Vercel (frontend) — seulement si tests OK ───────────────
  # Railway déploie automatiquement le backend via "Wait for CI" dans ses settings.
  deploy-frontend:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: --prod
