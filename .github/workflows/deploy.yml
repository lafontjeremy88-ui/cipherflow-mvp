name: Deploy — Railway (production)

on:
  push:
    branches: ["master", "main"]

# N'autorise qu'un seul déploiement à la fois
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Les tests DOIVENT passer avant tout déploiement ─────────────────────
  test:
    name: Tests avant déploiement
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET_KEY: "ci-test-secret-key-32chars-minimum"
          OAUTH_STATE_SECRET: "ci-oauth-state-secret"
          FERNET_KEY: "RrdcRxBr2IIxHpfU6EBYxNPAp0Hk_j0-z-9nEaFWJgo="
          WATCHER_SECRET: "ci-watcher-secret"
          MISTRAL_API_KEY: "ci-mistral-key"
          RESEND_API_KEY: "ci-resend-key"
          RESEND_FROM_EMAIL: "no-reply@cipherflow.company"
          FRONTEND_URL: "http://localhost:5173"
          ENABLE_RETENTION_WORKER: "false"
          ENVIRONMENT: "test"
        run: |
          python -m pytest tests/ -v --tb=short

  # ── 2. Déploiement Railway (backend) — seulement si tests OK ───────────────
  deploy-backend:
    name: Deploy backend → Railway
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      # Action officielle Railway — lit RAILWAY_TOKEN depuis l'env GitHub secret
      - name: Deploy backend to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: backend

  # ── 3. Déploiement Vercel (frontend) — seulement si tests OK ───────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      # Lancé depuis la racine du repo — ./frontend pointe vers le bon dossier.
      # Ne pas utiliser working-directory: frontend car Vercel CLI résoudrait
      # alors ./frontend → frontend/frontend (doublon).
      - name: Deploy frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --token "$VERCEL_TOKEN" --yes ./frontend
